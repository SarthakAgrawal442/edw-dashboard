<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDW Student Performance Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <svg class="logo" viewBox="0 0 36 36" fill="none" aria-label="EDW Logo">
      <rect width="36" height="36" rx="8" fill="#4f98a3"/>
      <path d="M8 10h12M8 18h20M8 26h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="27" cy="10" r="4" fill="#fff"/>
    </svg>
    <span class="topbar-title">EDW Student Performance</span>
  </div>
  <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">☀️</button>
</header>

<!-- ── KPI Cards ─────────────────────────────────────────────── -->
<main class="page">
  <section class="kpi-row" id="kpi-row">
    <div class="kpi-card"><div class="kpi-label">Total Students</div><div class="kpi-value" id="kpi-students">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Courses</div><div class="kpi-value" id="kpi-courses">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Enrollments</div><div class="kpi-value" id="kpi-enrollments">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Overall Avg GPA</div><div class="kpi-value" id="kpi-gpa">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Overall Pass Rate</div><div class="kpi-value" id="kpi-pass">—</div></div>
  </section>

  <!-- ── Charts Row 1 ────────────────────────────────────────── -->
  <section class="chart-row">
    <div class="chart-card wide">
      <h2 class="chart-title">Average GPA by Department Over Time</h2>
      <canvas id="gpaChart"></canvas>
    </div>
    <div class="chart-card">
      <h2 class="chart-title">Grade Distribution by Department</h2>
      <canvas id="gradeChart"></canvas>
    </div>
  </section>

  <!-- ── Charts Row 2 ────────────────────────────────────────── -->
  <section class="chart-row">
    <div class="chart-card">
      <h2 class="chart-title">Enrollment by Program per Semester</h2>
      <canvas id="enrollChart"></canvas>
    </div>
    <div class="chart-card wide">
      <h2 class="chart-title">Top 20 Courses — Pass Rate by Instructor</h2>
      <canvas id="passChart"></canvas>
    </div>
  </section>
</main>

<script src="/js/dashboard.js"></script>
</body>
</html>
